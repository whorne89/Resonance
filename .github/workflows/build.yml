name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            archive_ext: zip
          - os: ubuntu-latest
            platform: linux
            archive_ext: tar.gz
          - os: macos-latest
            platform: macos
            archive_ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr portaudio19-dev

      - name: Install system dependencies (macOS)
        if: matrix.platform == 'macos'
        run: |
          brew install tesseract portaudio

      - name: Create venv and install
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Build with PyInstaller
        run: uv run pyinstaller resonance.spec -y

      - name: Archive (Windows)
        if: matrix.platform == 'windows'
        run: 7z a "Resonance-windows.zip" "./dist/Resonance/"

      - name: Archive (Linux)
        if: matrix.platform == 'linux'
        run: tar -czf "Resonance-linux.tar.gz" -C dist Resonance

      - name: Archive (macOS)
        if: matrix.platform == 'macos'
        run: cd dist && zip -r "../Resonance-macos.zip" Resonance

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Resonance-${{ matrix.platform }}
          path: Resonance-${{ matrix.platform }}.${{ matrix.archive_ext }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            artifacts/Resonance-windows/Resonance-windows.zip
            artifacts/Resonance-linux/Resonance-linux.tar.gz
            artifacts/Resonance-macos/Resonance-macos.zip
